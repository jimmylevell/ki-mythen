name: CI / Deploy

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    # ── Build & lint ─────────────────────────────────────────────
    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  GITHUB_PAGES: "true"
              # Vite reads GITHUB_PAGES to set base: '/ki-mythen/' — see vite.config.js

            # Upload dist/ so the deploy job can reuse it without rebuilding
            - uses: actions/upload-artifact@v7
              if: github.ref == 'refs/heads/main'
              with:
                  name: dist
                  path: dist/
                  retention-days: 1

    # ── Deploy to GitHub Pages (main branch only) ─────────────────
    deploy:
        name: Deploy to GitHub Pages
        needs: build
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest

        permissions:
            contents: read
            pages: write
            id-token: write

        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}

        steps:
            - uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist/

            - uses: actions/configure-pages@v6

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: dist/

            - name: Deploy
              id: deploy
              uses: actions/deploy-pages@v5
